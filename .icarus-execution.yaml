# Go + go test demo for the BWI Test Hub — CONTAINER execution.
# Declares a runtime PROFILE (never a raw image); the hub maps it to an
# approved image in its runner-image catalog. CGO disabled so the pure-Go
# suite builds on the slim golang:alpine image (no gcc). No
# environment.inherit — the image provides its own PATH/HOME (and thus
# the Go build cache under $HOME).
version: 1
name: go-test-demo
command:
  argv: ["sh", "run.sh"]
runtime:
  profile: go-1
  required: true
environment:
  set:
    CGO_ENABLED: "0"
timeout:
  durationSeconds: 300
reportArtifacts:
  - kind: html-report
    path: report/index.html
    description: go test HTML report
  - kind: junit-xml
    path: report/junit.xml
    description: JUnit results
