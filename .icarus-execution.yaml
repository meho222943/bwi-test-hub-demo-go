# Go + go test demo for the BWI Test Hub.
# No runtime profile ⇒ runs as a host process (DIRECT_PROCESS), needs
# only the Go toolchain — no container runtime required.
version: 1
name: go-test-demo
command:
  argv: ["sh", "run.sh"]
# The hub builds a deny-by-default environment: declare exactly what
# the run needs. `go` lives outside the default PATH on many hosts, and
# `go build`/`go test` need HOME for the module/build cache.
environment:
  inherit: ["PATH", "HOME"]
timeout:
  durationSeconds: 180
reportArtifacts:
  - kind: html-report
    path: report/index.html
    description: go test HTML report
  - kind: junit-xml
    path: report/junit.xml
    description: JUnit results
